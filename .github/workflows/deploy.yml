name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer commit makes an in-flight deploy obsolete; don't race them.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag by commit so every build is addressable and immutable. `latest`
      # moves; this one never does, which is what makes a rollback exact.
      - id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_NODE_URL=${{ vars.VITE_NODE_URL || 'https://demosnode.discus.sh' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Point the deployment at this exact build, then roll it out. Coolify
      # only shifts traffic once the new container passes its health check.
      - name: Deploy
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          curl -fsS -X PATCH \
            "$COOLIFY_URL/api/v1/applications/$COOLIFY_APP_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"docker_registry_image_tag\":\"$TAG\"}" > /dev/null
          curl -fsS \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
